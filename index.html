<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一元线性回归分析</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- 顶部：页面标题与控制栏 -->
        <header class="header">
            <div class="header-title">
                <h1>一元线性回归分析</h1>
            </div>
            <div class="header-controls">
                <div class="control-item">
                    <label for="r-input">目标相关系数 (R):</label>
                    <input type="number" id="r-input" min="-1" max="1" step="0.01" value="0.00">
                    <input type="range" id="r-slider" min="-1" max="1" step="0.01" value="0.00">
                </div>
            </div>
        </header>

        <div class="main-content">
            <!-- 中间：ECharts 散点图 -->
            <main class="chart-area">
                <div class="panel chart-panel">
                    <div class="chart-toolbar">
                        <div class="mode-switcher">
                            <button class="mode-btn active" data-mode="drag">拖拽</button>
                            <button class="mode-btn" data-mode="add">添加</button>
                            <button class="mode-btn" data-mode="delete">删除</button>
                        </div>
                        <div class="zoom-control">
                            <label for="zoom-slider">缩放:</label>
                            <input type="range" id="zoom-slider" min="20" max="200" value="100">
                            <span id="zoom-value">100%</span>
                        </div>
                    </div>
                    <div id="main-chart" style="width: 100%; height: 100%;"></div>
                </div>
            </main>

            <!-- 右侧：统计量展示 -->
            <aside class="sidebar-right">
                <div class="panel stat-panel">
                    <h2>统计指标</h2>
                    <div id="math-stats-container">
                        <!-- KaTeX 将在这里渲染公式 -->
                    </div>
                </div>
            </aside>
        </div>

        <div class="table-section">
            <!-- 散点数据区与数据表 -->
            <div class="panel">
                <h2>散点数据</h2>
                <div class="table-container">
                    <table id="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>X</th>
                                <th>Y</th>
                                <th>预测值(Ŷ)</th>
                                <th>(Y-Ȳ)²</th>
                                <th>(Ŷ-Ȳ)²</th>
                                <th>(Y-Ŷ)²</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- 数据由 JavaScript 动态生成 -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 底部：方差分析 (ANOVA) 表格 -->
            <div class="panel">
                <h2>方差分析 (ANOVA)</h2>
                <div class="table-container">
                    <table class="anova-table">
                        <thead>
                            <tr>
                                <th>方差来源</th>
                                <th>平方和 (SS)</th>
                                <th>自由度 (df)</th>
                                <th>均方 (MS)</th>
                                <th>F值</th>
                                <th>p值</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>回归 (Regression)</td>
                                <td id="anova-ssr">-</td>
                                <td id="anova-dfr">1</td>
                                <td id="anova-msr">-</td>
                                <td id="anova-f">-</td>
                                <td id="anova-p">-</td>
                            </tr>
                            <tr>
                                <td>残差 (Residual)</td>
                                <td id="anova-sse">-</td>
                                <td id="anova-dfe">-</td>
                                <td id="anova-mse">-</td>
                                <td></td>
                                <td></td>
                            </tr>
                            <tr>
                                <td>总计 (Total)</td>
                                <td id="anova-sst">-</td>
                                <td id="anova-dft">-</td>
                                <td></td>
                                <td></td>
                                <td></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 程序入口，采用 ES Module -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
